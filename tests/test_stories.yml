#### This file contains tests to evaluate that your bot behaves as expected.
#### If you want to learn more, please see the docs: https://rasa.com/docs/rasa/testing-your-assistant

stories:
- story: greet and check order
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      what is the status of my order ORD-12345?
    intent: check_order_status
    entities:
    - order_id: ORD-12345
  - action: order_status_form
  - active_loop: order_status_form
  - slot_was_set:
    - order_id: ORD-12345
  - active_loop: null
  - action: action_submit_order_status_form

- story: greet and goodbye
  steps:
  - user: |
      hi!
    intent: greet
  - action: utter_greet
  - user: |
      bye!
    intent: goodbye
  - action: utter_goodbye

- story: return refund flow
  steps:
  - user: |
      I want to return my order
    intent: return_refund
  - action: return_refund_form
  - active_loop: return_refund_form

- story: product inquiry
  steps:
  - user: |
      tell me about wireless headphones
    intent: product_inquiry
    entities:
    - product_name: wireless headphones
  - action: utter_product_info

- story: billing question
  steps:
  - user: |
      i have a billing question
    intent: billing_question
  - action: utter_billing_info

- story: complaint
  steps:
  - user: |
      i'm very unhappy with my order
    intent: complaint
  - action: utter_complaint_acknowledge

- story: handoff to human
  steps:
  - user: |
      i want to talk to a human
    intent: handoff_to_human
  - action: action_escalate_to_agent

- story: bot challenge
  steps:
  - user: |
      are you a bot?
    intent: bot_challenge
  - action: utter_iamabot

- story: out of scope
  steps:
  - user: |
      what's the weather today?
    intent: out_of_scope
  - action: utter_default

- story: fallback handled by action
  steps:
  - user: |
      asdfghjkl
    intent: nlu_fallback
  - action: action_handle_fallback

- story: billing charge
  steps:
  - user: |
      i see an unexpected charge
    intent: billing_charge
  - action: action_handle_billing_charge

- story: billing invoice
  steps:
  - user: |
      i need an invoice
    intent: billing_invoice
  - action: action_handle_billing_invoice

- story: billing payment method
  steps:
  - user: |
      payment methods accepted
    intent: billing_payment_method
  - action: action_handle_billing_payment

- story: small talk
  steps:
  - user: |
      you're doing a great job
    intent: small_talk
  - action: utter_small_talk

- story: ask capabilities
  steps:
  - user: |
      what can you do?
    intent: ask_capabilities
  - action: utter_capabilities

- story: frustrated user gets escalated
  steps:
  - user: |
      this is so frustrating
    intent: frustrated
  - action: utter_frustrated_acknowledge
  - action: action_escalate_to_agent
